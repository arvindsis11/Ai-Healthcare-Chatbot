# Render.com Blueprint — AI Healthcare Chatbot

services:
  # ── Backend ───────────────────────────────────────────────
  - type: web
    name: ai-healthcare-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: healthcare-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: '["https://ai-healthcare-frontend.onrender.com","http://localhost:3000"]'
      - key: DEBUG
        value: "false"

  # ── Frontend ──────────────────────────────────────────────
  - type: web
    name: ai-healthcare-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://ai-healthcare-backend.onrender.com
      - key: NODE_ENV
        value: production

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: healthcare-redis
    plan: free
    ipAllowList: []

# ── PostgreSQL ──────────────────────────────────────────────
databases:
  - name: healthcare-db
    databaseName: healthcare
    plan: free
