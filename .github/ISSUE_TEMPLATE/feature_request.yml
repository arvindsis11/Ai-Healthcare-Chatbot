name: Feature Request
description: Suggest a new feature or enhancement for the AI Healthcare Platform
title: "Feature: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please fill in the details below to help us understand your idea.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A clear and concise description of the feature you are requesting.
      placeholder: Describe the feature and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Use Case
      description: Why is this feature needed? What problem does it solve for users or developers?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you would implement this feature at a high level.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches? If so, why do you prefer this one?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Backend API (FastAPI)
        - RAG Pipeline
        - LLM / AI Models
        - Frontend (Next.js UI)
        - Security
        - Performance / Caching
        - DevOps / Deployment
        - Testing
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - Small (< 1 day)
        - Medium (1–3 days)
        - Large (> 3 days)
    validations:
      required: true

  - type: checkboxes
    id: labels
    attributes:
      label: Suggested Labels
      options:
        - label: enhancement
        - label: good first issue
        - label: help wanted
        - label: documentation

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This feature aligns with the project's medical safety guidelines.
          required: false
